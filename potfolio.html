<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff7e5f, #feb47b, #6a11cb, #2575fc); /* Colorful gradient background */
            color: #333;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.5); /* Darken navbar slightly for better contrast */
            background-image: none;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .navele {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 30px;
        }

        .logo a {
            font-size: 40px;
            font-weight: 700;
            color: violet;
            text-decoration: none;
        }

        ul {
            list-style: none;
            display: flex;
        }

        li {
            margin-left: 20px;
        }

        li a {
            color: #f32121;
            font-size: 18px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        li a:hover {
            color: dodgerblue;
        }

        img {
            border-radius: 50%;
            display: block;
            margin: 40px auto;
            border: 5px solid #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            color: #333;
            margin-top: 20px;
        }

        #home {
            text-align: center;
            padding: 50px;
            background-color: #ffffff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            margin: 30px auto;
            max-width: 800px;
        }

        #home h1 {
            font-size: 32px;
            color: #333;
        }
    </style>
</head>
